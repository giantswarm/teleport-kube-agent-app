{{- if .Values.cleanStateOnUpgrade }}
#
# Pre-upgrade hook to clean teleport-kube-agent state secrets before upgrade.
# This ensures agents start fresh when configuration changes.
#
# The hook runs before the upgrade and uses kubectl to delete state secrets.
# This is more reliable than the 'teleport kube-state delete' command which
# may not be available in all Teleport versions.
#
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pre-upgrade-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
{{- if .Values.extraLabels.serviceAccount }}
  labels:
  {{- toYaml .Values.extraLabels.serviceAccount | nindent 4 }}
{{- end }}
---
{{- end }}
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-pre-upgrade-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
{{- if .Values.extraLabels.role }}
  labels:
  {{- toYaml .Values.extraLabels.role | nindent 4 }}
{{- end }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "delete", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-pre-upgrade-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-8"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
{{- if .Values.extraLabels.roleBinding }}
  labels:
  {{- toYaml .Values.extraLabels.roleBinding | nindent 4 }}
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-pre-upgrade-cleanup
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-pre-upgrade-cleanup
  namespace: {{ .Release.Namespace }}
---
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-pre-upgrade-cleanup-{{ now | date "20060102-150405" }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-7"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
{{- if .Values.extraLabels.job }}
  labels:
  {{- toYaml .Values.extraLabels.job | nindent 4 }}
{{- end }}
spec:
  backoffLimit: 3
  template:
    metadata:
      name: {{ .Release.Name }}-pre-upgrade-cleanup
    spec:
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
  {{- toYaml .Values.imagePullSecrets | nindent 6 }}
{{- end }}
{{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
{{- end }}
      serviceAccountName: {{ .Release.Name }}-pre-upgrade-cleanup
      restartPolicy: OnFailure
      # ServiceAccount token automatically mounted for kubectl authentication
      automountServiceAccountToken: true
{{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 6 }}
{{- end }}
{{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
{{- end }}
      containers:
      - name: cleanup-state
        env:
          - name: KUBE_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: RELEASE_NAME
            value: {{ .Release.Name }}
        # Using Giant Swarm's docker-kubectl image for reliable secret deletion
        # The teleport-distroless image does not have kubectl or kube-state command
        image: '{{ include "registry" . }}/giantswarm/docker-kubectl:1.28.3'
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
          - -c
          - |
            set -euo pipefail
            echo "=== Teleport Kube Agent Pre-Upgrade State Cleanup ==="
            echo "Namespace: ${KUBE_NAMESPACE}"
            echo "Release: ${RELEASE_NAME}"
            echo ""
            
            # Find all state secrets for this release
            echo "Searching for state secrets matching: ${RELEASE_NAME}-*-state"
            SECRETS=$(kubectl get secrets -n "${KUBE_NAMESPACE}" \
              -o name \
              2>/dev/null | grep -E "${RELEASE_NAME}-[0-9]+-state" || true)
            
            if [ -z "$SECRETS" ]; then
              echo "No state secrets found. Nothing to clean up."
              exit 0
            fi
            
            echo "Found state secrets:"
            echo "$SECRETS"
            echo ""
            
            # Delete each secret
            echo "Deleting state secrets..."
            for secret in $SECRETS; do
              echo "  Deleting: $secret"
              kubectl delete -n "${KUBE_NAMESPACE}" "$secret" || echo "  Warning: Failed to delete $secret"
            done
            
            echo ""
            echo "=== State cleanup completed successfully ==="
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # kubectl needs to write to /tmp
          runAsNonRoot: true
          runAsUser: 1000  # docker-kubectl default user
{{- end }}

